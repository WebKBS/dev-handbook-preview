<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting…</title>
    <script>
      // GitHub Pages SPA redirect: preserve path/search/hash and send to base with a redirect param
      (function () {
        var base = "/dev-handbook-preview";
        var l = window.location;
        var path = l.pathname.startsWith(base)
          ? l.pathname.slice(base.length)
          : l.pathname;
        var redirect = encodeURIComponent(path + l.search + l.hash);
        l.replace(base + "/?redirect=" + redirect);
      })();
    </script>
  </head>
  <body>
    <p>Redirecting…</p>
  </body>
</html>
